<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Новый студент</title>
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #ffffff;
            padding: 40px;
            width: 500px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        .error-box {
            background: #fee2e2;
            border: 1px solid #f87171;
            color: #b91c1c;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 18px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 6px rgba(37,99,235,0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            background: #1d4ed8;
        }

        .back-link {
            display: block;
            margin-top: 18px;
            text-align: center;
            text-decoration: none;
            color: #2563eb;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Добавить студента</h1>

    <div th:if="${error}" class="error-box">
        <strong>Ошибка:</strong> <span th:text="${error}"></span>
    </div>

    <form th:action="@{/students}" method="post">
        <div class="form-group">
            <input type="text" name="firstName" placeholder="Имя" required />
        </div>
        <div class="form-group">
            <input type="text" name="lastName" placeholder="Фамилия" required />
        </div>
        <div class="form-group">
            <input type="email" name="email" placeholder="Email" required />
        </div>
        <div class="form-group">
            <input type="text" name="address" placeholder="Адрес" required />
        </div>
        <div class="form-group">
            <input type="text" name="phone" placeholder="Телефон" required />
        </div>
        <div class="form-group">
            <input type="date" name="birthDate" required />
        </div>

        <button type="submit">Добавить</button>
    </form>

    <a href="/students" class="back-link">← Назад</a>
</div>

</body>
</html>
